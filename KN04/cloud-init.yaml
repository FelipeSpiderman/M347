users:
  - name: ubuntu
    sudo: ALL=(ALL) NOPASSWD:ALL
    groups: users, admin, docker
    home: /home/ubuntu
    shell: /bin/bash
    ssh_authorized_keys:
      - ssh-rsa  aws-key
      - ssh-rsa  aws-key

ssh_pwauth: false
disable_root: false

package_update: true
package_upgrade: true

groups:
  - docker

system_info:
  default_user:
    groups: [docker]

packages:
  - apt-transport-https
  - ca-certificates
  - curl
  - gnupg
  - lsb-release
  - unattended-upgrades

write_files:
  - path: /home/ubuntu/docker-compose.yml
    content: |
      version: '3.8'

      services:
        db:
          image: onlybanaenaes/kn02:kn02b-db
          container_name: m347-kn04-cloud-db
          networks:
            tbznet:
              ipv4_address: 172.30.5.10
          expose:
            - "3306"

        web:
          image: onlybanaenaes/kn02:kn02b-web
          container_name: m347-kn04-cloud-web
          ports:
            - "80:80"
          networks:
            tbznet:
              ipv4_address: 172.30.5.11
          depends_on:
            - db
          links:
            - db:m347-kn04-cloud-db

      networks:
        tbznet:
          driver: bridge
          ipam:
            config:
              - subnet: 172.30.0.0/16
                ip_range: 172.30.5.0/24
                gateway: 172.30.5.254

runcmd:
  - mkdir -p /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
  - echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" | tee /etc/apt/sources.list.d/docker.list > /dev/null
  - apt-get update
  - apt-get install -y docker-ce docker-ce-cli containerd.io docker-compose-plugin
  - systemctl enable docker
  - systemctl start docker
  - chown ubuntu:ubuntu /home/ubuntu/docker-compose.yml
  - cd /home/ubuntu && sudo -u ubuntu docker compose up -d
  - sleep 30

final_message: "The system is finally up, after $UPTIME seconds"
